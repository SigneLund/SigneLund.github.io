<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vores tid sammen ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            overflow: hidden;
        }

        .card {
            position: relative;
            text-align: center;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 400px;
            cursor: pointer;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #e63946;
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            font-weight: normal;
        }

        .subtitle {
            margin-bottom: 1rem;
            color: #555;
        }

        .counter {
            font-size: 1.1rem;
            font-weight: bold;
            line-height: 1.8;
        }

        .heart {
            font-size: 2rem;
            animation: beat 1s infinite;
            margin-bottom: 1rem;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 💖 flying hearts */
        .floating-heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: fly 1s ease-out forwards;
        }

        @keyframes fly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(1.5);
                opacity: 0;
            }
        }

        /* 🐶 dog */
        #dog {
            width: 150px;
            margin-top: 15px;
            transition: transform 0.2s;
        }
    </style>
</head>

<body>

<div class="card" id="card">

    <div class="heart">❤️</div>

    <h1>Vores tid sammen</h1>

    <div class="subtitle">Siden 14. maj 2015</div>

    <div class="counter" id="counter"></div>

    <!-- 🐶 DOG -->
    <img id="dog" src="images/package.gif">
</div>

<script>
    /* ❤️ TIMER */
    function updateCounter() {
        const startDate = new Date("2015-05-14T00:00:00");
        const now = new Date();

        const diffMs = now - startDate;

        const totalSeconds = Math.floor(diffMs / 1000);
        const totalMinutes = Math.floor(totalSeconds / 60);
        const totalHours = Math.floor(totalMinutes / 60);
        const totalDays = Math.floor(totalHours / 24);

        const seconds = totalSeconds % 60;
        const minutes = totalMinutes % 60;
        const hours = totalHours % 24;

        document.getElementById("counter").innerHTML = `
        ${totalDays.toLocaleString('da-DK')} dage<br>
        ${hours} timer<br>
        ${minutes} minutter<br>
        ${seconds} sekunder
    `;
    }

    updateCounter();
    setInterval(updateCounter, 1000);


    /* 🐶 DOG LOGIC */
    let lastFed = Date.now();
    const dog = document.getElementById("dog");

    /* 💖 HEART EXPLOSION + FEED DOG */
    const card = document.getElementById("card");

    card.addEventListener("click", (e) => {

        // feed dog
        lastFed = Date.now();
        dog.src = "images/dog.gif";
        dog.style.transform = "scale(1.2)";
        setTimeout(() => dog.style.transform = "scale(1)", 200);

        // hearts
        for (let i = 0; i < 25; i++) {
            createHeart(e.clientX, e.clientY);
        }
    });


    function createHeart(x, y) {
        const heart = document.createElement("div");
        heart.classList.add("floating-heart");
        heart.innerText = "❤️";

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 200 + 50;

        const xMove = Math.cos(angle) * distance + "px";
        const yMove = Math.sin(angle) * distance + "px";

        heart.style.left = x + "px";
        heart.style.top = y + "px";
        heart.style.setProperty("--x", xMove);
        heart.style.setProperty("--y", yMove);

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 1000);
    }


    /* 💀 CHECK IF DOG DIES AFTER 7 DAYS */
    setInterval(() => {
        const now = Date.now();
        const diffDays = (now - lastFed) / (1000 * 60 * 60 * 24);

        if (diffDays >= 7) {
            dog.src = "images/dogded.gif";
        }
    }, 60000);

</script>

</body>
</html>
